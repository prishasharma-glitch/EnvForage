name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write # Required for PyPI OIDC Trusted Publishing

jobs:
  release:
    name: Create Release & Build Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build CLI Package
        run: |
          cd cli
          python -m build

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cli/dist/*.whl
            cli/dist/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Downcase repository name for Docker
        run: |
          echo "REPO_LC=$(echo ${GITHUB_REPOSITORY} | tr '[A-Z]' '[a-z]')" >> ${GITHUB_ENV}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/backend:latest
            ghcr.io/${{ env.REPO_LC }}/backend:${{ github.ref_name }}

      - name: Publish CLI package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cli/dist/
